<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body {
        background-color: #0b0b0d;
        color: #e8e9ec;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .boot-splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .boot-logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141518;
        color: #d2d4d9;
        animation: welcome-pop-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.05s;
      }
      .boot-logo svg {
        width: 22px;
        height: 22px;
      }
      .boot-logo rect {
        fill: currentColor;
        animation-duration: 0.7s;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: both;
      }
      .boot-logo rect:nth-child(1) {
        animation-name: welcome-slide-in-top-bar;
        animation-delay: 0.1s;
      }
      .boot-logo rect:nth-child(2) {
        animation-name: welcome-slide-in-mid-bar;
        animation-delay: 0.18s;
      }
      .boot-logo rect:nth-child(3) {
        animation-name: welcome-slide-in-bot-bar;
        animation-delay: 0.26s;
      }

      @keyframes welcome-pop-in {
        0% {
          transform: scale(0.92);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes welcome-slide-in-top-bar {
        0% {
          transform: translate(-8px, -4px);
          opacity: 0;
        }
        100% {
          transform: translate(0, 0);
          opacity: 1;
        }
      }

      @keyframes welcome-slide-in-mid-bar {
        0% {
          transform: translate(8px, 0);
          opacity: 0;
        }
        100% {
          transform: translate(0, 0);
          opacity: 1;
        }
      }

      @keyframes welcome-slide-in-bot-bar {
        0% {
          transform: translate(-8px, 4px);
          opacity: 0;
        }
        100% {
          transform: translate(0, 0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div class="boot-logo">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="5.5"  width="13" height="2.6" rx="1.3" />
            <rect x="7" y="10.7" width="13" height="2.6" rx="1.3" />
            <rect x="4" y="15.9" width="13" height="2.6" rx="1.3" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

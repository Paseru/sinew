<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #12131a;
      --card-bg: #1a1b26;
      --text: #ffffff;
      --text-muted: #787a91;
      --green: #4ade80;
      --green-bg: rgba(74, 222, 128, 0.15);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #5e5ce6;
    }

    body {
      width: 280px;
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .logo-container {
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .status-pill.connected {
      background: var(--green-bg);
      color: var(--green);
    }

    .status-pill.disconnected {
      background: var(--red-bg);
      color: var(--red);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .description {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.4;
      margin: 0 0 20px 0;
    }

    .stats-container {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .stats-value {
      font-weight: 600;
      color: var(--text);
    }

    .btn-refresh {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease, transform 0.1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-refresh:active {
      transform: scale(0.98);
    }

    .footer {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 20px;
      border-top: 1px solid var(--border);
      width: 100%;
      padding-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="icon-128.png" class="logo-img" alt="Sinew Logo">
  </div>
  
  <h1 class="title">Sinew</h1>
  
  <div class="status-pill disconnected" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text">Disconnected</span>
  </div>

  <p class="description">Control Chrome with Sinew.</p>

  <div class="stats-container">
    <span>Active tabs tracked</span>
    <span class="stats-value" id="attached-count">0</span>
  </div>

  <button class="btn-refresh" id="btn-refresh">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
    </svg>
    <span>Reconnect</span>
  </button>

  <div class="footer">
    Version v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
